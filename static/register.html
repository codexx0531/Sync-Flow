<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncFlow | Register</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Dynamic Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i data-lucide="layers" class="logo-icon"></i>
                <span>SyncFlow</span>
            </div>
            <h2>Create Account</h2>
            <p class="auth-lead">Get started with a premium team collaborative experience.</p>

            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name"><i data-lucide="user"></i> Full Name</label>
                    <input type="text" id="reg-name" placeholder="First Name Last Name" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="auth-email"><i data-lucide="mail"></i> Email Address</label>
                    <input type="email" id="auth-email" placeholder="example@gmail.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="auth-password"><i data-lucide="lock"></i> Password</label>
                    <input type="password" id="auth-password" placeholder="Min 6 characters" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="reg-role"><i data-lucide="shield"></i> Account Role</label>
                    <select id="reg-role">
                        <option value="Member">Team Member</option>
                        <option value="Admin">System Administrator</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <div class="auth-footer">
                <span>Already have an account?</span>
                <a href="/login">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Frontend Core Application Script -->
    <script src="js/register.js"></script>
</body>
</html>
